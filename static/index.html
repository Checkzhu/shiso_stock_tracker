<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股选股追踪系统</title>
<style>
:root {
  --bg: #0a0e17;
  --bg2: #111827;
  --bg3: #1a2332;
  --bg4: #222d3d;
  --ink: #e8ecf1;
  --muted: #8899aa;
  --rule: #2a3545;
  --accent: #00d4aa;
  --accent2: #ff6b35;
  --accent3: #3b82f6;
  --red: #ef4444;
  --green: #22c55e;
  --yellow: #eab308;
  --font: -apple-system, 'Microsoft YaHei', sans-serif;
  --font-mono: 'JetBrainsMono', 'Consolas', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--ink); line-height: 1.6; min-height: 100vh; }

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--rule); padding: 1.5rem 0; position: fixed; height: 100vh; overflow-y: auto; z-index: 100; }
.main { margin-left: 240px; flex: 1; padding: 2rem; min-height: 100vh; }

/* ── Sidebar ── */
.logo { padding: 0 1.25rem 1.5rem; border-bottom: 1px solid var(--rule); margin-bottom: 1rem; }
.logo h1 { font-size: 1.1rem; color: var(--accent); letter-spacing: -0.02em; }
.logo span { font-size: 0.75rem; color: var(--muted); display: block; margin-top: 0.25rem; }
.nav-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.7rem 1.25rem; color: var(--muted); cursor: pointer; transition: all 0.2s; font-size: 0.9rem; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--ink); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,212,170,0.08); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

/* ── Page Header ── */
.page-header { margin-bottom: 2rem; }
.page-header h2 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
.page-header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem; }

/* ── Stats Grid ── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: var(--bg2); border: 1px solid var(--rule); border-radius: 10px; padding: 1.25rem; }
.stat-card .stat-label { font-size: 0.78rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.stat-card .stat-value { font-size: 1.8rem; font-weight: 700; font-family: var(--font-mono); margin-top: 0.25rem; }
.stat-card .stat-value.accent { color: var(--accent); }
.stat-card .stat-value.blue { color: var(--accent3); }
.stat-card .stat-value.orange { color: var(--accent2); }

/* ── Stock Table ── */
.card { background: var(--bg2); border: 1px solid var(--rule); border-radius: 10px; overflow: hidden; margin-bottom: 1.5rem; }
.card-header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--rule); display: flex; justify-content: space-between; align-items: center; }
.card-header h3 { font-size: 1rem; font-weight: 600; }
table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 0.75rem 1rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); border-bottom: 1px solid var(--rule); background: var(--bg3); }
td { padding: 0.75rem 1rem; border-bottom: 1px solid var(--rule); font-size: 0.88rem; vertical-align: middle; }
tr:hover td { background: rgba(0,212,170,0.03); }
.stock-code { font-family: var(--font-mono); font-weight: 600; color: var(--accent3); }
.price { font-family: var(--font-mono); font-weight: 600; font-size: 0.95rem; }
.change-up { color: var(--red); }
.change-down { color: var(--green); }
.change-flat { color: var(--muted); }
.sector-tag { font-size: 0.75rem; color: var(--muted); max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Buttons ── */
.btn { padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid var(--rule); background: var(--bg3); color: var(--ink); cursor: pointer; font-size: 0.85rem; transition: all 0.2s; display: inline-flex; align-items: center; gap: 0.4rem; }
.btn:hover { background: var(--bg4); border-color: var(--muted); }
.btn-primary { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
.btn-primary:hover { background: #00b894; }
.btn-danger { background: transparent; color: var(--red); border-color: var(--red); }
.btn-danger:hover { background: rgba(239,68,68,0.1); }
.btn-sm { padding: 0.3rem 0.6rem; font-size: 0.78rem; }

/* ── Upload Area ── */
.upload-area { border: 2px dashed var(--rule); border-radius: 10px; padding: 3rem 2rem; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 1.5rem; }
.upload-area:hover { border-color: var(--accent); background: rgba(0,212,170,0.03); }
.upload-area.dragover { border-color: var(--accent); background: rgba(0,212,170,0.06); }
.upload-area p { color: var(--muted); font-size: 0.9rem; }
.upload-area .icon { font-size: 2rem; margin-bottom: 0.5rem; }

/* ── Report List ── */
.report-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.25rem; border-bottom: 1px solid var(--rule); cursor: pointer; transition: background 0.2s; }
.report-item:last-child { border-bottom: none; }
.report-item:hover { background: var(--bg3); }
.report-info h4 { font-size: 0.92rem; font-weight: 600; }
.report-info span { font-size: 0.78rem; color: var(--muted); }
.report-meta { text-align: right; font-family: var(--font-mono); font-size: 0.8rem; color: var(--muted); }

/* ── Report Viewer ── */
.report-viewer { background: var(--bg); border: 1px solid var(--rule); border-radius: 10px; max-height: 70vh; overflow-y: auto; padding: 0; }
.report-viewer iframe { width: 100%; border: none; min-height: 60vh; }
.report-viewer .html-content { padding: 2rem; }

/* ── Empty State ── */
.empty { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.empty .icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

/* ── Loading ── */
.loading { text-align: center; padding: 2rem; color: var(--muted); }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid var(--rule); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
.toast { position: fixed; top: 1.5rem; right: 1.5rem; background: var(--bg3); border: 1px solid var(--accent); color: var(--ink); padding: 0.75rem 1.25rem; border-radius: 8px; font-size: 0.88rem; z-index: 9999; transform: translateX(120%); transition: transform 0.3s; max-width: 400px; }
.toast.show { transform: translateX(0); }
.toast.error { border-color: var(--red); }

/* ── Page hidden ── */
.page { display: none; }
.page.active { display: block; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .sidebar { width: 60px; }
  .sidebar .nav-text, .sidebar .logo span { display: none; }
  .sidebar .logo h1 { font-size: 0.9rem; }
  .main { margin-left: 60px; padding: 1rem; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="app">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="logo">
      <h1>StockTracker</h1>
      <span>A股选股追踪系统</span>
    </div>
    <div class="nav-item active" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span class="nav-text">仪表板</span>
    </div>
    <div class="nav-item" data-page="tracking">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span class="nav-text">实时追踪</span>
    </div>
    <div class="nav-item" data-page="reports">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="nav-text">报告管理</span>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main">

    <!-- ═══════ Dashboard Page ═══════ -->
    <div id="page-dashboard" class="page active">
      <div class="page-header">
        <h2>仪表板</h2>
        <p>A股选股追踪系统概览</p>
      </div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="card">
        <div class="card-header">
          <h3>最近导入的报告</h3>
        </div>
        <div id="recent-reports"></div>
      </div>
    </div>

    <!-- ═══════ Tracking Page ═══════ -->
    <div id="page-tracking" class="page">
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <h2>实时追踪</h2>
          <p>所有被追踪的股票及实时行情</p>
        </div>
        <button class="btn btn-primary" onclick="refreshQuotes()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          刷新行情
        </button>
      </div>
      <div class="card">
        <div id="stock-table-container"></div>
      </div>
    </div>

    <!-- ═══════ Reports Page ═══════ -->
    <div id="page-reports" class="page">
      <div class="page-header">
        <h2>报告管理</h2>
        <p>上传和管理选股报告</p>
      </div>

      <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept=".html" multiple style="display:none" onchange="handleUpload(this.files)">
        <div class="icon">📄</div>
        <p>点击或拖拽 HTML 选股报告到此处上传</p>
      </div>

      <div style="display:flex;gap:1rem;margin-bottom:1.5rem;">
        <button class="btn btn-primary" onclick="scanSourceDir()">扫描源目录</button>
        <span id="scan-status"></span>
      </div>

      <div class="card">
        <div class="card-header">
          <h3>所有报告</h3>
        </div>
        <div id="reports-list"></div>
      </div>

      <!-- Report Viewer Modal -->
      <div id="report-viewer-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;padding:2rem;">
        <div style="max-width:1100px;margin:0 auto;height:100%;display:flex;flex-direction:column;">
          <div style="display:flex;justify-content:space-between;margin-bottom:0.5rem;">
            <h3 id="viewer-title" style="color:var(--ink);"></h3>
            <button class="btn btn-danger btn-sm" onclick="closeViewer()">关闭</button>
          </div>
          <div class="report-viewer" style="flex:1;">
            <iframe id="viewer-iframe" style="width:100%;height:100%;border:none;min-height:60vh;"></iframe>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '';

// ── Navigation ──
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    const page = item.dataset.page;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(`page-${page}`).classList.add('active');
    if (page === 'dashboard') loadDashboard();
    if (page === 'tracking') loadTracking();
    if (page === 'reports') loadReports();
  });
});

// ── Toast ──
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3500);
}

// ── Helpers ──
async function api(path, opts = {}) {
  const res = await fetch(API + path, opts);
  return res.json();
}

function formatMarketCap(val) {
  if (!val) return '-';
  const n = Number(val);
  if (n >= 1e12) return (n / 1e12).toFixed(0) + '万亿';
  if (n >= 1e8) return (n / 1e8).toFixed(0) + '亿';
  if (n >= 1e4) return (n / 1e4).toFixed(0) + '万';
  return n.toFixed(0);
}

function formatVolume(val) {
  if (!val) return '-';
  const n = Number(val);
  if (n >= 1e4) return (n / 1e4).toFixed(0) + '万手';
  return n.toFixed(0);
}

function changeClass(val) {
  const n = Number(val);
  if (n > 0) return 'change-up';
  if (n < 0) return 'change-down';
  return 'change-flat';
}

function changeSign(val) {
  const n = Number(val);
  return n > 0 ? '+' : '';
}

// ── Dashboard ──
async function loadDashboard() {
  const [stats, reports] = await Promise.all([
    api('/api/dashboard'),
    api('/api/reports'),
  ]);

  const sg = document.getElementById('stats-grid');
  sg.innerHTML = `
    <div class="stat-card"><div class="stat-label">已导入报告</div><div class="stat-value accent">${stats.total_reports}</div></div>
    <div class="stat-card"><div class="stat-label">追踪中股票</div><div class="stat-value blue">${stats.active_stocks}</div></div>
    <div class="stat-card"><div class="stat-label">价格记录数</div><div class="stat-value orange">${stats.total_price_records}</div></div>
    <div class="stat-card"><div class="stat-label">最新报告</div><div class="stat-value" style="font-size:1rem;">${stats.latest_report ? stats.latest_report.date : '-'}</div></div>
  `;

  const rl = document.getElementById('recent-reports');
  if (reports.length === 0) {
    rl.innerHTML = '<div class="empty"><div class="icon">📭</div><p>暂无报告，请上传或扫描源目录</p></div>';
    return;
  }
  rl.innerHTML = reports.slice(0, 5).map(r => `
    <div class="report-item" onclick="viewReport(${r.id})">
      <div class="report-info">
        <h4>${r.title}</h4>
        <span>${r.filename}</span>
      </div>
      <div class="report-meta">
        <div>${r.date}</div>
        <div style="color:var(--accent);">${r.stocks_count} 只股票</div>
      </div>
    </div>
  `).join('');
}

// ── Tracking ──
async function loadTracking() {
  const container = document.getElementById('stock-table-container');
  container.innerHTML = '<div class="loading"><span class="spinner"></span>加载中...</div>';

  const quotes = await api('/api/stocks/quotes');

  if (quotes.length === 0) {
    container.innerHTML = '<div class="empty"><div class="icon">📊</div><p>暂无追踪中的股票，请先导入报告</p></div>';
    return;
  }

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>代码</th>
          <th>名称</th>
          <th>最新价</th>
          <th>涨跌幅</th>
          <th>今开</th>
          <th>最高</th>
          <th>最低</th>
          <th>成交额</th>
          <th>市盈率</th>
          <th>总市值</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        ${quotes.map(q => `
          <tr>
            <td class="stock-code">${q.code}</td>
            <td><strong>${q.name}</strong></td>
            <td class="price">${q.current_price ? q.current_price.toFixed(2) : '-'}</td>
            <td class="price ${changeClass(q.change_pct)}">${q.change_pct ? changeSign(q.change_pct) + q.change_pct.toFixed(2) + '%' : '-'}</td>
            <td>${q.open_price ? q.open_price.toFixed(2) : '-'}</td>
            <td>${q.high_price ? q.high_price.toFixed(2) : '-'}</td>
            <td>${q.low_price ? q.low_price.toFixed(2) : '-'}</td>
            <td>${formatVolume(q.turnover)}</td>
            <td>${q.pe_ratio ? q.pe_ratio.toFixed(1) : '-'}</td>
            <td>${formatMarketCap(q.market_cap)}</td>
            <td><button class="btn btn-danger btn-sm" onclick="stopTrack(${q.id}, '${q.name}')">停止追踪</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

async function refreshQuotes() {
  showToast('正在刷新行情数据...');
  await loadTracking();
  showToast('行情数据已刷新');
}

async function stopTrack(id, name) {
  if (!confirm(`确定停止追踪 ${name} 吗？`)) return;
  await api(`/api/stocks/${id}/deactivate`, { method: 'POST' });
  showToast(`已停止追踪 ${name}`);
  loadTracking();
}

// ── Reports ──
async function loadReports() {
  const reports = await api('/api/reports');
  const rl = document.getElementById('reports-list');
  if (reports.length === 0) {
    rl.innerHTML = '<div class="empty"><div class="icon">📭</div><p>暂无报告</p></div>';
    return;
  }
  rl.innerHTML = reports.map(r => `
    <div class="report-item">
      <div class="report-info" onclick="viewReport(${r.id})">
        <h4>${r.title}</h4>
        <span>${r.filename} &middot; 导入于 ${r.parsed_at ? new Date(r.parsed_at).toLocaleDateString() : '-'}</span>
      </div>
      <div class="report-meta" style="display:flex;align-items:center;gap:1rem;">
        <div>
          <div>${r.date}</div>
          <div style="color:var(--accent);">${r.stocks_count} 只股票</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deleteReport(${r.id})">删除</button>
      </div>
    </div>
  `).join('');
}

async function viewReport(id) {
  const report = await api(`/api/reports/${id}`);
  document.getElementById('viewer-title').textContent = report.title;

  // Create a blob URL with the full HTML content
  const blob = new Blob([report.html_content], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  document.getElementById('viewer-iframe').src = url;
  document.getElementById('report-viewer-overlay').style.display = 'flex';
}

function closeViewer() {
  document.getElementById('report-viewer-overlay').style.display = 'none';
  const iframe = document.getElementById('viewer-iframe');
  if (iframe.src) URL.revokeObjectURL(iframe.src);
  iframe.src = '';
}

// Close viewer with ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeViewer();
});

async function deleteReport(id) {
  if (!confirm('确定删除此报告吗？')) return;
  await api(`/api/reports/${id}`, { method: 'DELETE' });
  showToast('报告已删除');
  loadReports();
}

// ── Upload ──
async function handleUpload(files) {
  for (const file of files) {
    const form = new FormData();
    form.append('file', file);
    try {
      const result = await fetch(API + '/api/reports/upload', { method: 'POST', body: form }).then(r => r.json());
      showToast(result.message + (result.stocks_count ? `，发现 ${result.stocks_count} 只股票` : ''));
    } catch (e) {
      showToast('上传失败: ' + e.message, true);
    }
  }
  loadReports();
  loadDashboard();
}

// Drag and drop
const uploadArea = document.getElementById('upload-area');
uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('dragover');
  handleUpload(e.dataTransfer.files);
});

async function scanSourceDir() {
  const status = document.getElementById('scan-status');
  status.innerHTML = '<span class="spinner"></span> 扫描中...';
  try {
    const result = await api('/api/reports/scan', { method: 'POST' });
    status.innerHTML = '';
    showToast(result.message);
    loadReports();
    loadDashboard();
  } catch (e) {
    status.innerHTML = '';
    showToast('扫描失败: ' + e.message, true);
  }
}

// ── Init ──
loadDashboard();
</script>
</body>
</html>
